services:

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL — almacena virtual keys, spend tracking y usuarios
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Redis — cache semántico y rate limiting distribuido
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Presidio Analyzer — detección de PII (tarjetas, emails, etc.)
  # OPCIONAL: solo se levanta con: docker compose --profile pii up -d
  # Imagen: mcr.microsoft.com/presidio/presidio-analyzer (tag fijo 2.2.354)
  # ─────────────────────────────────────────────────────────────
  presidio-analyzer:
    image: mcr.microsoft.com/presidio/presidio-analyzer:2.2.354
    container_name: ai-gateway-presidio-analyzer
    profiles: ["pii"]
    restart: unless-stopped
    environment:
      - PORT=3000
    ports:
      - "5002:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────
  # Presidio Anonymizer — enmascarado de PII en respuestas
  # OPCIONAL: solo se levanta con: docker compose --profile pii up -d
  # ─────────────────────────────────────────────────────────────
  presidio-anonymizer:
    image: mcr.microsoft.com/presidio/presidio-anonymizer:2.2.354
    container_name: ai-gateway-presidio-anonymizer
    profiles: ["pii"]
    restart: unless-stopped
    environment:
      - PORT=3000
    ports:
      - "5001:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # LiteLLM Proxy — AI Gateway principal
  # API OpenAI-compatible en http://localhost:4000
  # UI de administración en http://localhost:4000/ui
  # ─────────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-gateway-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://litellm:litellm_password@postgres:5432/litellm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: redis_password
      PRESIDIO_ANALYZER_API_BASE: http://presidio-analyzer:3000
      PRESIDIO_ANONYMIZER_API_BASE: http://presidio-anonymizer:3000
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["litellm", "--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────
  # Prometheus — scraping de métricas de LiteLLM
  # Dashboard en http://localhost:9090
  # No depende de litellm: arranca siempre y espera a que el
  # target esté disponible para empezar a scrapearlo.
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-gateway-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
