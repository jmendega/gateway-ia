# Stack de observabilidad con OpenTelemetry.
# Captura métricas específicas de LLM que un API Gateway tradicional no provee:
# - Tokens de entrada/salida por usuario y modelo
# - TTFT (Time to First Token) para evaluar experiencia de streaming
# - Hit rate del cache semántico
# - Latencia por proveedor
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: ai-gateway
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      attributes:
        actions:
          - key: service.name
            value: ai-gateway-spike
            action: insert

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: ai_gateway

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch, attributes]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - "--config=/etc/otel/config.yaml"
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel/config.yaml
              subPath: config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prometheus
              containerPort: 8889
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: ai-gateway
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
---
# RouteOption que habilita telemetría AI en las rutas.
# samplingRate: 1.0 = 100% de trazas (adecuado para spike, reducir en producción).
apiVersion: gateway.kgateway.dev/v1alpha1
kind: RouteOption
metadata:
  name: ai-observability
  namespace: ai-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: llm-route
  options:
    ai:
      observability:
        tokenMetrics:
          enabled: true
          labels:
            - model
            - provider
            - x-user-id
        streamingMetrics:
          enabled: true
        tracing:
          enabled: true
          samplingRate: 1.0
          endpoint: "otel-collector.ai-gateway.svc.cluster.local:4317"
