# Backend para Anthropic Claude — proveedor secundario / failover.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: Backend
metadata:
  name: anthropic-backend
  namespace: ai-gateway
spec:
  ai:
    llm:
      provider:
        anthropic:
          model: "claude-3-5-sonnet-20241022"
          authToken:
            secretRef:
              name: anthropic-api-key
              namespace: ai-gateway
              key: apiKey
---
apiVersion: v1
kind: Service
metadata:
  name: anthropic-backend
  namespace: ai-gateway
spec:
  type: ExternalName
  externalName: api.anthropic.com
  ports:
    - port: 443
      protocol: TCP
